dataset: lh_hub_finance_silver/silver/ods_customer

owner: manuel.martins@coebank.org

# --------------------------------------------------------------------------- #
# Column contracts
# NOTE: DESCRIBE was truncated at 20 rows; columns beyond that are not covered.
#       Run: spark.sql("DESCRIBE TABLE lh_hub_finance_silver.silver.ods_customer").toPandas().to_string()
#       and add the remaining columns below.
# --------------------------------------------------------------------------- #
columns:
  - name: pk_ods_customer
    data_type: string
    checks:
      - type: missing
        name: pk_ods_customer must not be null

  - name: customer_key
    data_type: string

  - name: customer_reference
    data_type: string
    checks:
      - type: missing
        name: customer_reference must not be null

  - name: data_date
    data_type: timestamp

  - name: short_name
    data_type: string
    checks:
      - type: missing
        name: short_name must not be null

  - name: nationality
    data_type: string

  - name: country
    data_type: string
    checks:
      - type: missing
        name: country must not be null

  - name: sector_code
    data_type: string
    checks:
      - type: invalid
        name: sector_code must reference a known sector
        valid_values_column:
          dataset: lh_hub_finance_silver/silver/ods_sector
          column: sector_reference
        threshold:
          metric: percent
          must_be_less_than: 5

  - name: status
    data_type: integer
    checks:
      - type: missing
        name: status must not be null

  - name: write_date
    data_type: timestamp

  - name: branch_subsidiary
    data_type: string

  - name: city
    data_type: string

  - name: lei
    data_type: string

  - name: name_1
    data_type: string
    checks:
      - type: missing
        name: name_1 must not be null

  - name: name_2
    data_type: string

  - name: moodys_st_rating
    data_type: string

  - name: moodys_st_rating_dt
    data_type: timestamp

  - name: moodys_lt_rating
    data_type: string

  - name: moodys_lt_rating_dt
    data_type: timestamp

  - name: moodys_outlook
    data_type: string

# --------------------------------------------------------------------------- #
# Table-level checks
# --------------------------------------------------------------------------- #
checks:
  - type: schema
    name: All declared columns must exist
    # allow_extra_columns: true because DESCRIBE was truncated at 20 rows
    allow_extra_columns: true

  - type: row_count
    name: Table must not be empty
    threshold:
      must_be_greater_than_or_equal: 1

  - type: duplicate
    name: pk_ods_customer must be unique
    columns:
      - pk_ods_customer
