dataset: lh_hub_finance_silver/silver/lu_hc_sector_grp

owner: manuel.martins@coebank.org

# --------------------------------------------------------------------------- #
# Column contracts
# --------------------------------------------------------------------------- #
columns:
  - name: sector_code_t24
    data_type: string
    checks:
      - type: missing
        name: sector_code_t24 must not be null

  - name: matrix_code
    data_type: string
    checks:
      - type: missing
        name: matrix_code must not be null

  - name: product_grp
    data_type: string

  - name: sector_grp
    data_type: string
    checks:
      - type: missing
        name: sector_grp must not be null

  - name: write_date
    data_type: timestamp
    checks:
      - type: freshness
        name: write_date must be no older than 2 days
        unit: day
        threshold:
          must_be_less_than: 2

  - name: ctr_file_name
    data_type: string

  - name: ctr_ins_date
    data_type: timestamp

  - name: ctr_username
    data_type: string

  - name: ctr_notebook
    data_type: string

  - name: ctr_hash_validate
    data_type: string

# --------------------------------------------------------------------------- #
# Table-level checks
# --------------------------------------------------------------------------- #
checks:
  - type: schema
    name: All declared columns must exist
    allow_extra_columns: false

  - type: row_count
    name: Table must not be empty
    threshold:
      must_be_greater_than_or_equal: 1

  - type: duplicate
    name: sector_code_t24 must be unique
    columns:
      - sector_code_t24
