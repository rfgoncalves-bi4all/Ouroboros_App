dataset: lh_hub_finance_silver/silver/lu_lgd_product

owner: manuel.martins@coebank.org

# --------------------------------------------------------------------------- #
# Column contracts
# --------------------------------------------------------------------------- #
columns:
  - name: contract_type
    data_type: string
    checks:
      - type: missing
        name: contract_type must not be null

  - name: lgd_product
    data_type: string
    checks:
      - type: missing
        name: lgd_product must not be null

  - name: ctr_file_name
    data_type: string

  - name: ctr_ins_date
    data_type: timestamp

  - name: ctr_username
    data_type: string

  - name: ctr_notebook
    data_type: string

  - name: ctr_hash_validate
    data_type: string

# --------------------------------------------------------------------------- #
# Table-level checks
# --------------------------------------------------------------------------- #
checks:
  - type: schema
    name: All declared columns must exist
    allow_extra_columns: false

  - type: row_count
    name: Table must not be empty
    threshold:
      must_be_greater_than_or_equal: 1

  - type: duplicate
    name: The combination of contract_type + lgd_product must be unique
    columns:
      - contract_type
      - lgd_product
